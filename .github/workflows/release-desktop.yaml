name: Release Desktop

on:
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag_name:
        required: true
        type: string
        description: Existing release tag (e.g. v4.4.0) to attach desktop assets to

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag_name }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @sola_mpd/shared build:no_types

      - name: Build frontend
        run: pnpm --filter @sola_mpd/frontend build:no_types

      - name: Build desktop
        run: pnpm --filter @sola_mpd/desktop build

      - name: Package desktop app
        run: pnpm --filter @sola_mpd/desktop dist

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag_name }}
          files: |
            packages/desktop/release/*.AppImage
            packages/desktop/release/*.dmg
            packages/desktop/release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
